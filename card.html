<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- daisyUI + Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"/>

    <!-- css -->
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="assets/github-logo.png"
      type="image/x-icon"/>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"/>

    <title>Dashboard</title>

</head>
<body class="bg-[#F8FAFC]">
    <nav class="bg-white border-b border-[#E9E9E9] sticky top-0">
        <div class="navbar bg-base-100 shadow-sm p-4 md:px-14">
            <div class="flex-1">
            <a href="" class="btn btn-ghost text-xl">
                <img src="./assets/github-logo.png" alt="" class="w-9" >
            <span class="hidden sm:flex text-lg md:text-2xl whitespace-nowrap font-semibold"> GitHub Issues Tracker</span>
        </a>
        </div>

        <div class="flex gap-2">
            <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
        </g>
        </svg>
        <input type="search" required placeholder="Search issues..." id="searchInput" />
    </label>
            <button id="searchBtn" class="btn btn-primary">+ New Issue</button>
            
        </div>
        </div>
    </nav>

    <section class="py-4 md:py-15 w-11/12 mx-auto space-y-4">
        <div id="btnDiv" class="bg-white p-6 rounded-lg flex gap-2" >
            <button id="allBtn" class="btn btn-primary w-26 sm:w-30">All</button>
            <button id="openBtn" class="btn btn-outline w-26 sm:w-30">Open</button>
            <button id="closedBtn" class="btn btn-outline w-26 sm:w-30">Closed</button>
        </div>

              <div class="bg-white rounded-lg">
        <div class="flex p-6 justify-between items-center">
          <div class="flex gap-3">
            <div
              class="bg-[#4800ff21] w-[60px] sm:w-[50px] rounded-full flex items-center justify-center">
              <img
                class="flex justify-center items-center"
                src="./assets/Aperture.png" alt=""/>
            </div>
            <div class="">
              <div id="totalCount"></div>
              <p
                class="text-[#64748B] text-xs sm:text-[16px] sm:whitespace-nowrap">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <div class="flex gap-4">
            <div class="flex justify-center items-center gap-2">
              <span
                class="w-3 h-3 rounded-full bg-[#00A96E] inline-block"></span>
              <h1>Open</h1>
            </div>
            <div class="flex justify-center items-center gap-2">
              <span
                class="w-3 h-3 rounded-full bg-[#A855F7] inline-block"></span>
              <h1>Closed</h1>
            </div>
          </div>
        </div>
      </div>

      <div id="cardContainer"
        class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
    </div>

    <section id="spinner"
        class="flex justify-center items-center text-[#422AD5] py-10 hidden">
        <span class="loading loading-spinner loading-lg"></span>
      </section>
    </section>
 
    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="issueModal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box space-y-4">
        <h3 id="title" class="text-lg font-bold">Fix Broken image Upload</h3>
                  <div class="flex gap-2 items-center">
            <div
              id="status"
              class="p-2 text-xs font-medium text-white rounded-full text-center">
              Opened
            </div>
            <span class="w-1 h-1 rounded-full bg-[#64748B]"></span>
            <h1 class="text-xs text-[#64748B]">
              Opened by <span id="author">Fahim Ahmed</span>
            </h1>
            <span class="w-1 h-1 rounded-full bg-[#64748B]"></span>
            <h1 id="date" class="text-xs text-[#64748B]">22/02/2026</h1>
          </div>
        
        <div id="labels" class="h-6 text-center flex"></div>
        <p id="description" class="">
          The navigation menu doesn't collapse properly on mobile devices. Need
          to fix the responsive behavior.
        </p>
        <div class="flex gap-2 bg-[#F8FAFC] rounded-lg p-4">
          <div class="w-1/2 space-y-1">
            <h1 class="text-[#64748B]">Assignee:</h1>
            <h1 id="assignee" class="font-semibold text-[#1F2937]">
              Fahim Ahmed
            </h1>
          </div>
          <div class="w-1/2 space-y-1">
            <h1 class="text-[#64748B]">Priority:</h1>
            <div
              id="priority"
              class="w-fit p-2 text-xs font-medium rounded-full text-white text-center">
              HIGH
            </div>
          </div>
        </div>


        <div class="modal-action">
        <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
              <button class="btn btn-sm  btn-ghost absolute right-5 top-5">✕</button>
            <button class="btn">Close</button>
        </form>
        </div>
    </div>
</div>
    </dialog>



    <script src="./card.js"></script>
</body>
</html>
